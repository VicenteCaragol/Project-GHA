name: sample-worfklow
on: push

job:
  job1:
  name: job1
  runs-on: ubuntu-latest
  steps:
    - name: Running single command in job1
      run: echo "Hello, world!"
    - name: Checking OS Release for Github Runner
      run: cat /etc/os-release
    - name: Calling Sleep
      run: sleep 10

  job2:
    name: JOB2
    runs-on: ubuntu-latest
    steps:
      - name: Checking name of Runner
        run: hostname
      - name: Runing multiple commands in job2
        run: |
          echo "Hello, world!"
          echo "Current date and time: $(date)"
          sleep 20