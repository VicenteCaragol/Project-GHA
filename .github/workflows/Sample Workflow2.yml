name: sample-worfklow2
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:


jobs:
  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5.0.0
      - name: Setup Python
        uses: actions/setup-python@v6.0.0
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: |
          pip install -r pyproject.toml
      - name: Run Tests
        run: pytest -v